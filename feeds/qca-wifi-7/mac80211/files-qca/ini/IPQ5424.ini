# INI file
# This file will contain IPQ5424 specific INI configurations

# Datapath configuration Parameters
# Add the data path specific config parameters below
# E.g For DP_RXDMA_BUF_RING
# dp_rxdma_buf_ring=8192

# Control path configuration Parameters
# Add the control path specific config parameters below
# E.g for TID-to-link mapping
# 0 - T2LM is not supported by the MLD
# 1 - MLD only supports the mapping of all TIDs to the same link set
# t2lm_enable=1

# Memory profile setting
# 0 - Indicates the system is not a low memory
# 1 - Implies system is low memory
low_mem_system=0