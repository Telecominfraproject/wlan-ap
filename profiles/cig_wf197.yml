---
profile: cig_wf197
target: ipq54xx
subtarget: generic
description: Build image for the CIG WF197
image: bin/targets/ipq54xx/generic/openwrt-ipq54xx-cig_wf197-squashfs-sysupgrade.tar
feeds:
  - name: qca
    path: ../../feeds/qca-wifi-7
include:
  - ucentral-ap
packages:
  - ipq54xx
  - ftm
  - qca-ssdk-shell
  - iperf3
  - sysstat
  - kmod-gpio-pca953x
  - kmod-qca81xx
  - kmod-hwmon-tmp103
diffconfig: |
  CONFIG_KERNEL_IPQ_MEM_PROFILE=0
  CONFIG_BUSYBOX_CUSTOM=y
  CONFIG_BUSYBOX_CONFIG_STTY=y
  CONFIG_PACKAGE_ATH_DEBUG=y
