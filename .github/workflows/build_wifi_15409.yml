name: WIFI-15409 SonicFi Firmware Build

on:
  workflow_dispatch:
  push:
    branches:
      - WIFI-15409-update-the-uboot-code-for-cybertan-auto-recovery-function

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - sonicfi_rap630c-311g
          - sonicfi_rap630w-311g
          - sonicfi_rap630w-312g
          - sonicfi_rap650c
          - sonicfi_rap7110c-341x
          - sonicfi_rap750e-h
          - sonicfi_rap750e-s
          - sonicfi_rap750w-311a

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for ${{ matrix.target }}
        run: |
          git config --global user.email "jemmy.lin@cybertan.com.tw"
          git config --global user.name "Jemmy Lin"
          make -j TARGET=${{ matrix.target }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/${{ matrix.target }}

          # Full targets output (safe and easy)
          tar czf artifacts/${{ matrix.target }}/openwrt-targets.tar.gz -C openwrt/bin/targets .

          # Exact upgrade image (if produced)
          if [ -f openwrt/tmp/image-file ]; then
            cp openwrt/tmp/image-file artifacts/${{ matrix.target }}/
            IMG="openwrt/$(cat openwrt/tmp/image-file)"
            [ -f "$IMG" ] && cp "$IMG" artifacts/${{ matrix.target }}/ || true
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wifi-15409-${{ matrix.target }}
          path: |
            artifacts/${{ matrix.target }}/**
            openwrt/bin/targets/**
