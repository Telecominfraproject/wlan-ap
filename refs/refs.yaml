# refs.yaml — Reference Materials Manifest
# ------------------------------------------
# Lists all external reference repositories to be cloned under refs/.
# Run `./scripts/refs-setup.sh` to populate the refs/ directory.
#
# Fields:
#   name        - Directory name under refs/ (must be unique)
#   uri         - Git clone URL (SSH or HTTPS)
#   sparse      - If true, default clone uses sparse checkout (md/ only)
#   description - Human-readable description for status displays

sources:
  - name: openwifi-reference-docs
    uri: https://PLACEHOLDER-REPO-URL/openwifi-reference-docs.git
    sparse: true
    description: >
      OpenWiFi project reference documents: vendor SDK guides, hardware
      datasheets, BBF/IEEE/IETF specifications, and external tool docs.
      Default clone checks out md/ (markdown + indexes) only to save disk.
      Use --full to include origin/ PDFs (~200+ MB).
